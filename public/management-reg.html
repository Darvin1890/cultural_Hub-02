<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="managemet-reg.css">
</head>
<body>
    <div class="header">
        <h2>🏫 College Management Login</h2>
        <p>Please enter your login details</p>

        <form action="/management-register" method="post">
            <div>
                <input type="text" name="college" placeholder="College Name" required>
            </div>
            <div>
                <input type="email" name="email" id="email" placeholder="Enter your Email" required>
            </div>
            <div>
                <input type="tel" name="mobile" id="mobilenumber" placeholder="Mobile Number" required>
            </div>
            <div>
                <input type="password" name="password" id="password" placeholder="Enter Password" required>
            </div>
            <div>
                <input type="password" name="cpassword" id="cpassword" placeholder="Confirm Password" required>
            </div>
            <div>
                <button type="submit" class="btn-submit">Register</button>
            </div>

        </form>

    </div>
    <script src="./JS/main.js"></script>
</body>
</html>
